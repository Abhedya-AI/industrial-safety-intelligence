services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: safety-intelligence-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./sensor_intelligence.db
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
